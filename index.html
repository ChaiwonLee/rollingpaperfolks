<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교수님을 위한 롤링페이퍼</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
    <style>
        body { background-color: #fce4ec; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .swiper { width: 85%; max-width: 500px; height: 350px; }
        .swiper-slide { 
            background: white; border-radius: 15px; box-shadow: 0 8px 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; border: 2px solid #f06292;
        }
        .message { font-size: 1.3rem; color: #444; margin-bottom: 20px; word-break: keep-all; font-weight: bold; }
        .author { font-size: 1rem; color: #e91e63; }
    </style>
</head>
<body>
    <div class="swiper">
        <div class="swiper-wrapper" id="paper-content">
            <div class="swiper-slide">메시지를 불러오는 중입니다...</div>
        </div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script>
        // ★ 여기에 구글 시트 [웹에 게시] 후 받은 CSV 주소를 넣으세요!
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSM_XVLDiywYvUCsAFDruP9SdQJ3HhtT-ZQhDhkf9eFkIvz9pIGGTXBWyMP8x5lOMEF2FOv2V9bHcHY/pub?output=csv';

        async function loadMessages() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                // 줄바꿈으로 나누고 빈 줄 제거
                const rows = data.split('\n').filter(row => row.trim() !== '').slice(1);
                
                const wrapper = document.getElementById('paper-content');
                wrapper.innerHTML = ''; 

                rows.forEach(row => {
                    const columns = row.split(',');
                    if(columns.length >= 2) {
                        const name = columns[1].replace(/"/g, "");    // 이름 (따옴표 제거)
                        const message = columns[2].replace(/"/g, ""); // 메시지 (따옴표 제거)

                        const slide = `
                            <div class="swiper-slide">
                                <div class="message">${message}</div>
                                <div class="author">- ${name} 학생 -</div>
                            </div>
                        `;
                        wrapper.innerHTML += slide;
                    }
                });

                new Swiper('.swiper', {
                    navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
                    loop: rows.length > 1, 
                });

            } catch (error) {
                document.getElementById('paper-content').innerHTML = '<div class="swiper-slide">데이터를 불러오지 못했습니다. 링크를 확인해주세요.</div>';
            }
        }
        loadMessages();
    </script>
</body>
</html>
